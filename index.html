<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Logic Calculator</title>
    <style>
        body { background-color: #0c0c0c; color: #cccccc; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; padding: 20px; }
        #terminal { background: #000; width: 100%; max-width: 600px; padding: 20px; border: 1px solid #444; border-radius: 5px; min-height: 400px; box-shadow: 0 0 15px rgba(0,255,0,0.1); }
        .input-line { display: flex; margin-top: 10px; color: #00ff00; }
        input { background: transparent; border: none; color: #00ff00; outline: none; font-family: inherit; font-size: 16px; width: 100%; }
        .output { white-space: pre-wrap; margin-bottom: 5px; }
        .warning { color: #ffcc00; }
        .error { color: #ff3333; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="history"></div>
    <div class="input-line">
        <span id="prompt">> </span>
        <input type="text" id="userInput" autofocus autocomplete="off">
    </div>
</div>

<script>
    const history = document.getElementById('history');
    const input = document.getElementById('userInput');
    const prompt = document.getElementById('prompt');

    let state = "START"; 
    let a, b, choice;
    const max_limit = 10 ** 15;
    const max_exponent = 100;

    function print(text, type = "") {
        const div = document.createElement('div');
        div.className = "output " + type;
        div.innerText = text;
        history.appendChild(div);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function init() {
        print("Welcome to the calculator!");
        print("Note: decimals will be rounded to the nearest 2 decimal places");
        askFirstNumber();
    }

    function askFirstNumber() {
        print("Please enter the first number: ");
        state = "GET_A";
    }

    function askOperation() {
        print("Please select an operation:");
        print("1. Addition\n2. Subtraction\n3. Multiplication\n4. Division\n5. Exponent\n6. Square root\n7. Percentage");
        print("Input the number (1, 2, 3, 4, 5, 6, 7): ");
        state = "GET_CHOICE";
    }

    function handleInput(val) {
        print("> " + val, "user-input");
        val = val.trim();

        if (state === "GET_A") {
            if (val === "") {
                print("Warning: You entered an empty value. Please enter a valid number.", "warning");
            } else if (!isNaN(val)) {
                a = parseFloat(val);
                askOperation();
            } else {
                print("Invalid input! Please enter a valid number.", "error");
            }
        } 
        
        else if (state === "GET_CHOICE") {
            if (["1", "2", "3", "4", "5", "6", "7"].includes(val)) {
                choice = val;
                if (choice === "6") {
                    handleSquareRoot();
                } else {
                    print("Please enter the second number: ");
                    state = "GET_B";
                }
            } else {
                print("Sorry, but that is not a valid operation.", "error");
                print("Your first number is " + a);
                askOperation();
            }
        }

        else if (state === "GET_B") {
            if (val === "") {
                print("Warning: You entered an empty value. Please enter a valid number.", "warning");
            } else if (!isNaN(val)) {
                b = parseFloat(val);
                performCalculation();
            } else {
                print("Invalid input! Please enter a valid number.", "error");
            }
        }

        else if (state === "RESTART_OR_EXIT") {
            if (val === "0") {
                print("Exiting calculator...");
                input.disabled = true;
            } else if (val === "1") {
                print("Welcome back!");
                askFirstNumber();
            } else {
                print("Invalid request!", "error");
                print("-press 0 to exit- or -press 1 to restart-");
            }
        }
    }

    function handleSquareRoot() {
        if (a < 0) {
            print("Warning: You cannot calculate the square root of a negative number.", "warning");
            print("Please enter a valid positive number: ");
            state = "GET_A"; // Return to A to get a positive one
        } else {
            print("The answer to √ " + a + " is " + Math.round(Math.sqrt(a) * 100) / 100);
            askRestart();
        }
    }

    function performCalculation() {
        let result;
        if (choice === "1") result = a + b;
        if (choice === "2") result = a - b;
        if (choice === "3") {
            if (Math.abs(a * b) > max_limit) {
                print("Error: The product is too high.", "error");
                print("Please enter the second number: ");
                return;
            }
            result = a * b;
        }
        if (choice === "4") {
            if (b === 0) {
                print("Error: Division by zero.", "error");
                print("Please enter the second number: ");
                return;
            }
            result = a / b;
        }
        if (choice === "5") {
            if (Math.abs(b) > max_exponent || Math.abs(Math.pow(a, b)) > max_limit) {
                print("Error: The exponent or result is too high.", "error");
                print("Please enter the base number: ");
                state = "GET_A";
                return;
            }
            result = Math.pow(a, b);
        }
        if (choice === "7") {
            if (b === 0) {
                print("Error: Division by zero.", "error");
                print("Please enter the second number: ");
                return;
            }
            result = (a / b * 100).toFixed(2) + "%";
            print("The percentage of " + a + " to " + b + " is " + result);
            askRestart();
            return;
        }

        const opMap = {"1":"+", "2":"-", "3":"×", "4":"÷", "5":"^"};
        print("The answer to " + a + " " + opMap[choice] + " " + b + " is " + Math.round(result * 100) / 100);
        askRestart();
    }

    function askRestart() {
        print("-press 0 to exit- or -press 1 to restart-");
        state = "RESTART_OR_EXIT";
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = input.value;
            input.value = "";
            handleInput(val);
        }
    });

    init();
</script>

</body>
</html>
